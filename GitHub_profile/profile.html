<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Профили</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключение шрифта Inter для современного минималистичного стиля -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Подключаем JavaScript логику как модуль -->
    <script type="module" src="program_logic/app.js" defer></script>
</head>
<body>
    <div class="app-container">
        <!-- Шапочка (Header) -->
        <header class="header">
            <div class="header-content">
                <span class="header-logo">GitHub-профили</span>
            </div>
        </header>

        <!-- Секция поиска и результатов ниже шапочки -->
        <main class="main-content">
            <div class="search-section">
                <!-- Форма позволяет искать и по кнопке, и по клавише Enter -->
                <form class="search-wrapper" id="search-form">
                    <input type="text" id="username-input" placeholder="Введите юзернейм на GitHub..." class="search-input" aria-label="GitHub юзернейм" required autocomplete="off">
                    <button type="submit" class="search-btn">Найти</button>
                </form>
            </div>
            
            <div class="main-card">
                <!-- Левая колонка: карточка профиля + карточка репозиториев -->
                <div class="left-column" id="cards-container">
                    <!-- Сюда динамически добавляются карточки пользователей -->
                </div>
                <!-- Правая колонка: карточка топ языков -->
                <div class="right-column" id="languages-container">
                    <!-- Сюда динамически добавляется карточка топ языков -->
                </div>
            </div>
            
        </main>
    </div>
</body>
</html>
