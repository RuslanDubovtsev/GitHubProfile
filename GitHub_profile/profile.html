<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Профили</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключение шрифта Inter для современного минималистичного стиля -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Шапочка (Header) -->
        <header class="header">
            <div class="header-content">
                <span class="header-logo">GitHub-профили</span>
            </div>
        </header>

        <!-- Секция поиска ниже шапочки -->
        <main class="main-content">
            <div class="search-section">
                <div class="search-wrapper">
                    <input type="text" placeholder="Введите юзернейм на GitHub..." class="search-input" aria-label="GitHub юзернейм">
                    <button type="button" class="search-btn">Найти</button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
